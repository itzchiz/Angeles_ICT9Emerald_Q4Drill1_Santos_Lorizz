<!DOCTYPE html>
<html lang="en">
<head>
    <title>Q3 Skills Test</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- first bootstrap from the official site-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d') center/cover;
            height: 100vh;
        }

        .form-container {
            background: rgba(0, 123, 150, 0.6);
            padding: 30px;
            border-radius: 15px;
            color: white;
        }

        .profile-box {
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .profile-box img {
            width: 120px;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        .btn-custom {
            background-color: #00c3d6;
            color: white;
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">eSakay</span>
    <div>
        <a href="#" class="text-white me-3">Home</a>
        <a href="#" class="text-white me-3">Fare Matrix</a>
        <a href="#" class="text-white me-3">Schedule</a>
        <a href="#" class="text-white">Help</a>
    </div>
</nav>

<!-- main stuff -->
<div class="container mt-5">
    <div class="row justify-content-center">

        <!-- profile     -->
        <div class="col-md-4 profile-box">
            <img src="https://via.placeholder.com/120" id="preview">
            
            <input type="file" class="form-control mt-2" onchange="previewImage(event)">
            <button class="btn btn-custom mt-2">Upload Photo</button>
        </div>

       
        <div class="col-md-5 form-container">
            <h2>REGISTRATION</h2>
            <p>Please fill out all required fields</p>

            <form onsubmit="return submitForm()">

                <input type="text" class="form-control mb-2" id="fname" placeholder="First Name" required>
                <input type="text" class="form-control mb-2" id="lname" placeholder="Last Name" required>

                <input type="text" class="form-control mb-2" placeholder="Contact Number" required>

                <input type="email" class="form-control mb-2" id="email" placeholder="Email" required>

                <input type="password" class="form-control mb-2" id="pass" placeholder="Password" required>

                <div class="form-check mb-2">
                    <input type="checkbox" class="form-check-input" id="terms" required>
                    <label class="form-check-label">
                        I accept the <a href="https://www.w3schools.com">Terms of Use</a>
                    </label>
                </div>

                <button type="submit" class="btn btn-custom w-100">Create my account</button>
                <button type="reset" class="btn btn-light w-100 mt-2">Cancel</button>

            </form>
        </div>

    </div>
</div>

<footer>
    Loriz Santos | 9 - Emerlad
</footer>

<script>
    // Preview uploaded image
    function previewImage(event) {
        let reader = new FileReader();
        reader.onload = function(){
            document.getElementById('preview').src = reader.result;
        }
        reader.readAsDataURL(event.target.files[0]);
    }

    // Form submission function
    function submitForm() {

        // Variables
        let firstName = document.getElementById("fname").value;
        let lastName = document.getElementById("lname").value;
        let email = document.getElementById("email").value;

        // check condiyions
        if(firstName === "" || lastName === "" || email === ""){
            alert("Please complete all fields!");
            return false;
        }

        // Output 
        alert("This page says:\nYour profile has been uploaded.\n\nWelcome, " + firstName + "!");

        return false;
    }
</script>

</body>
</html>
